# HMS Backend Configuration
server.port=8080
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]

# ----------------------------------------
#  DATABASE CONFIGURATION (ENVIRONMENT-DRIVEN)
# ----------------------------------------
# Values are loaded automatically from the .env file via spring-dotenv
spring.datasource.url=${MYSQL_URL}
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ----------------------------------------
#  SECURITY & SESSION
# ----------------------------------------
# Ensure JSESSIONID is HttpOnly
server.servlet.session.cookie.http-only=true
server.servlet.session.timeout=30m

# Logging
logging.level.com.capgemini.hms=DEBUG
logging.file.name=logs/hms-backend.log

# Seeded admin credentials
admin.username=${ADMIN_USERNAME:}
admin.password=${ADMIN_PASSWORD:}
admin.email=${ADMIN_EMAIL:admin@local.test}
admin.dev-fallback.username=${ADMIN_DEV_FALLBACK_USERNAME:dev-admin}
admin.dev-fallback.password=${ADMIN_DEV_FALLBACK_PASSWORD:}

# OpenAPI / Swagger (Standard Defaults)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
