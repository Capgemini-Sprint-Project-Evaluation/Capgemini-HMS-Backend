<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout(~{::title}, ~{::section})}">
<head><title>Patients — HMS</title></head>
<body>
<section class="p-8 min-h-screen">

    <!-- Header -->
    <div class="flex justify-between items-end mb-8">
        <div>
            <h2 class="text-3xl font-extrabold tracking-tight text-on-surface font-headline">Patients</h2>
            <p class="text-on-surface-variant mt-1">Manage patient registrations and clinical records.</p>
        </div>
        <button onclick="openModal()" class="inline-flex items-center gap-2 px-5 py-3 bg-primary text-white font-semibold rounded-xl hover:bg-sky-700 transition-all active:scale-95 shadow-lg shadow-primary/20 text-sm">
            <span class="material-symbols-outlined">person_add</span> Add Patient
        </button>
    </div>

    <!-- Search bar -->
    <div class="flex gap-3 mb-6">
        <div class="relative flex-1 max-w-sm">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-xl">search</span>
            <input id="search-input" type="text" placeholder="Search by name or phone…"
                   class="w-full pl-10 pr-4 py-2.5 bg-surface-container-lowest border border-outline-variant/30 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-primary/20"/>
        </div>
        <button onclick="doSearch()" class="px-4 py-2.5 bg-surface-container text-on-surface text-sm font-medium rounded-xl hover:bg-surface-container-high transition-colors">Search</button>
        <button onclick="loadPatients(0)" class="px-4 py-2.5 bg-surface-container text-on-surface text-sm font-medium rounded-xl hover:bg-surface-container-high transition-colors">Reset</button>
    </div>

    <!-- Table -->
    <div class="bg-surface-container-lowest rounded-xl overflow-hidden shadow-sm">
        <div class="overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                    <tr class="bg-surface-container-low/50">
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">SSN</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Name</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Phone</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Insurance ID</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">PCP ID</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Address</th>
                        <th class="px-6 py-4 text-xs font-bold text-outline uppercase tracking-wider">Actions</th>
                    </tr>
                </thead>
                <tbody id="patient-tbody" class="divide-y divide-surface-container-low/50">
                    <tr><td colspan="7" class="px-6 py-8 text-center text-outline text-sm">Loading…</td></tr>
                </tbody>
            </table>
        </div>
        <!-- Pagination -->
        <div class="px-6 py-4 flex justify-between items-center border-t border-surface-container-low text-sm text-on-surface-variant">
            <span id="page-info">—</span>
            <div class="flex gap-2">
                <button id="prev-btn" onclick="changePage(-1)" class="px-3 py-1.5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-colors disabled:opacity-40">← Prev</button>
                <button id="next-btn" onclick="changePage(1)"  class="px-3 py-1.5 bg-surface-container rounded-lg hover:bg-surface-container-high transition-colors disabled:opacity-40">Next →</button>
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="fixed inset-0 z-[100] hidden items-center justify-center bg-black/20 backdrop-blur-sm">
        <div class="bg-surface-container-lowest w-full max-w-lg rounded-2xl shadow-2xl p-8 m-4 max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h3 class="text-2xl font-extrabold text-on-surface font-headline" id="modal-title">Register Patient</h3>
                    <p class="text-on-surface-variant text-sm mt-1" id="modal-sub">Fill in the patient details below.</p>
                </div>
                <button onclick="closeModal()" class="p-2 hover:bg-surface-container-low rounded-full transition-colors">
                    <span class="material-symbols-outlined text-outline">close</span>
                </button>
            </div>
            <input type="hidden" id="f-ssn-hidden"/>
            <div class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">SSN *</label>
                        <input id="f-ssn" type="number" placeholder="100000001" class="field-input mt-1"/>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Full Name *</label>
                        <input id="f-name" type="text" placeholder="John Smith" class="field-input mt-1"/>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-semibold text-outline uppercase tracking-wider">Address *</label>
                    <input id="f-address" type="text" placeholder="123 Medical Lane, Health City" class="field-input mt-1"/>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Phone *</label>
                        <input id="f-phone" type="text" placeholder="+1-555-0199" class="field-input mt-1"/>
                    </div>
                    <div>
                        <label class="text-xs font-semibold text-outline uppercase tracking-wider">Insurance ID *</label>
                        <input id="f-insurance" type="text" placeholder="INS789456" class="field-input mt-1"/>
                    </div>
                </div>
                <div>
                    <label class="text-xs font-semibold text-outline uppercase tracking-wider">PCP (Physician) ID</label>
                    <input id="f-pcp" type="number" placeholder="101 (optional)" class="field-input mt-1"/>
                </div>
                <div id="modal-err" class="hidden text-error text-sm bg-error-container rounded-lg px-3 py-2"></div>
                <div class="flex gap-3 pt-2">
                    <button onclick="closeModal()" class="flex-1 py-3 bg-surface-container-high text-on-surface-variant font-bold rounded-xl hover:bg-surface-container-highest transition-colors text-sm">Cancel</button>
                    <button onclick="savePatient()" class="flex-[2] py-3 bg-primary text-white font-bold rounded-xl hover:bg-sky-700 transition-all active:scale-95 shadow-lg shadow-primary/20 text-sm" id="save-btn">Save Patient</button>
                </div>
            </div>
        </div>
    </div>
</section>

<style>
.field-input { display:block; width:100%; padding:0.6rem 0.875rem; background:#f3f4f5; border:none; border-radius:0.75rem; font-size:0.875rem; outline:none; transition:all 0.15s; }
.field-input:focus { background:#fff; box-shadow:0 0 0 2px rgba(0,99,151,0.15); }
</style>

<script>
let currentPage = 0;
let totalPages = 0;
let editMode = false;

async function loadPatients(page) {
    currentPage = page;
    editMode = false;
    const tbody = document.getElementById('patient-tbody');
    tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-outline text-sm">Loading…</td></tr>';
    try {
        const res = await apiFetch(`/api/v1/patients?page=${page}&size=10&sort=ssn,asc`);
        if (!res || !res.ok) { tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-error text-sm">Failed to load patients.</td></tr>'; return; }
        const body = await res.json();
        const data = body.data; // PagedResponse
        totalPages = data.totalPages;
        document.getElementById('page-info').textContent = `Page ${data.pageNo + 1} of ${data.totalPages} (${data.totalElements} records)`;
        document.getElementById('prev-btn').disabled = data.pageNo === 0;
        document.getElementById('next-btn').disabled = data.last;
        if (!data.content || data.content.length === 0) {
            tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-outline text-sm">No patients found.</td></tr>'; return;
        }
        tbody.innerHTML = data.content.map(p => `
            <tr class="hover:bg-primary-fixed/20 transition-colors">
                <td class="px-6 py-4 text-sm font-medium text-primary">${p.ssn}</td>
                <td class="px-6 py-4">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-secondary-container flex items-center justify-center text-xs font-bold text-primary flex-shrink-0">${initials(p.name)}</div>
                        <span class="font-semibold text-on-surface text-sm">${p.name}</span>
                    </div>
                </td>
                <td class="px-6 py-4 text-sm text-on-surface-variant">${p.phone}</td>
                <td class="px-6 py-4 text-sm text-on-surface-variant">${p.insuranceId}</td>
                <td class="px-6 py-4 text-sm text-on-surface-variant">${p.pcpId ?? '—'}</td>
                <td class="px-6 py-4 text-sm text-on-surface-variant max-w-[180px] truncate" title="${p.address}">${p.address}</td>
                <td class="px-6 py-4">
                    <div class="flex gap-2">
                        <button onclick='openEdit(${JSON.stringify(p)})' class="p-1.5 hover:bg-primary-fixed/30 rounded-lg transition-colors text-primary" title="Edit">
                            <span class="material-symbols-outlined text-lg">edit</span>
                        </button>
                        <button onclick="deletePatient(${p.ssn})" class="p-1.5 hover:bg-error-container rounded-lg transition-colors text-error" title="Delete">
                            <span class="material-symbols-outlined text-lg">delete</span>
                        </button>
                    </div>
                </td>
            </tr>`).join('');
    } catch(e) { tbody.innerHTML = `<tr><td colspan="7" class="px-6 py-8 text-center text-error text-sm">${e.message}</td></tr>`; }
}

async function doSearch() {
    const q = document.getElementById('search-input').value.trim();
    if (!q) { loadPatients(0); return; }
    const tbody = document.getElementById('patient-tbody');
    tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-outline text-sm">Searching…</td></tr>';
    try {
        const res = await apiFetch(`/api/v1/patients/search?query=${encodeURIComponent(q)}&page=0&size=20`);
        if (!res || !res.ok) return;
        const data = (await res.json()).data;
        document.getElementById('page-info').textContent = `${data.totalElements} result(s) found`;
        if (!data.content.length) { tbody.innerHTML = '<tr><td colspan="7" class="px-6 py-8 text-center text-outline text-sm">No matches.</td></tr>'; return; }
        tbody.innerHTML = data.content.map(p => `
            <tr class="hover:bg-primary-fixed/20 transition-colors">
                <td class="px-6 py-4 text-sm font-medium text-primary">${p.ssn}</td>
                <td class="px-6 py-4 font-semibold text-on-surface text-sm">${p.name}</td>
                <td class="px-6 py-4 text-sm text-on-surface-variant">${p.phone}</td>
                <td class="px-6 py-4 text-sm text-on-surface-variant">${p.insuranceId}</td>
                <td class="px-6 py-4 text-sm text-on-surface-variant">${p.pcpId ?? '—'}</td>
                <td class="px-6 py-4 text-sm text-on-surface-variant">${p.address}</td>
                <td class="px-6 py-4">
                    <button onclick='openEdit(${JSON.stringify(p)})' class="p-1.5 hover:bg-primary-fixed/30 rounded-lg transition-colors text-primary"><span class="material-symbols-outlined text-lg">edit</span></button>
                    <button onclick="deletePatient(${p.ssn})" class="p-1.5 hover:bg-error-container rounded-lg transition-colors text-error"><span class="material-symbols-outlined text-lg">delete</span></button>
                </td>
            </tr>`).join('');
    } catch(e) {}
}

function changePage(delta) { loadPatients(currentPage + delta); }
function initials(name) { return (name || '??').split(' ').map(n=>n[0]).slice(0,2).join('').toUpperCase(); }

function openModal() {
    editMode = false;
    document.getElementById('modal-title').textContent = 'Register Patient';
    document.getElementById('modal-sub').textContent = 'Fill in the patient details below.';
    document.getElementById('save-btn').textContent = 'Save Patient';
    ['f-ssn','f-name','f-address','f-phone','f-insurance','f-pcp'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-ssn').disabled = false;
    document.getElementById('modal-err').classList.add('hidden');
    document.getElementById('modal').classList.replace('hidden','flex');
}

function openEdit(p) {
    editMode = true;
    document.getElementById('modal-title').textContent = 'Edit Patient';
    document.getElementById('modal-sub').textContent = `Editing SSN: ${p.ssn}`;
    document.getElementById('save-btn').textContent = 'Update Patient';
    document.getElementById('f-ssn').value = p.ssn; document.getElementById('f-ssn').disabled = true;
    document.getElementById('f-ssn-hidden').value = p.ssn;
    document.getElementById('f-name').value = p.name;
    document.getElementById('f-address').value = p.address;
    document.getElementById('f-phone').value = p.phone;
    document.getElementById('f-insurance').value = p.insuranceId;
    document.getElementById('f-pcp').value = p.pcpId || '';
    document.getElementById('modal-err').classList.add('hidden');
    document.getElementById('modal').classList.replace('hidden','flex');
}

function closeModal() { document.getElementById('modal').classList.replace('flex','hidden'); }

async function savePatient() {
    const errEl = document.getElementById('modal-err');
    errEl.classList.add('hidden');
    const ssn = editMode ? parseInt(document.getElementById('f-ssn-hidden').value) : parseInt(document.getElementById('f-ssn').value);
    const payload = {
        ssn, name: document.getElementById('f-name').value.trim(),
        address: document.getElementById('f-address').value.trim(),
        phone: document.getElementById('f-phone').value.trim(),
        insuranceId: document.getElementById('f-insurance').value.trim(),
        pcpId: document.getElementById('f-pcp').value ? parseInt(document.getElementById('f-pcp').value) : null
    };
    if (!payload.ssn || !payload.name || !payload.address || !payload.phone || !payload.insuranceId) {
        errEl.textContent = 'SSN, Name, Address, Phone, and Insurance ID are required.'; errEl.classList.remove('hidden'); return;
    }
    const btn = document.getElementById('save-btn'); btn.disabled = true;
    try {
        const url  = editMode ? `/api/v1/patients/${ssn}` : '/api/v1/patients';
        const meth = editMode ? 'PUT' : 'POST';
        const res  = await apiFetch(url, { method: meth, body: JSON.stringify(payload) });
        if (!res) return;
        const body = await res.json();
        if (!res.ok) { errEl.textContent = body.message || 'Error saving patient.'; errEl.classList.remove('hidden'); return; }
        showToast(editMode ? 'Patient updated!' : 'Patient registered!');
        closeModal();
        loadPatients(currentPage);
    } catch(e) { errEl.textContent = e.message; errEl.classList.remove('hidden'); }
    finally { btn.disabled = false; }
}

async function deletePatient(ssn) {
    confirmAction(`Delete patient SSN ${ssn}? This action cannot be undone.`, async () => {
        const res = await apiFetch(`/api/v1/patients/${ssn}`, { method: 'DELETE' });
        if (res && res.ok) { showToast('Patient deleted.'); loadPatients(currentPage); }
        else showToast('Failed to delete patient.', 'error');
    });
}

// Init
loadPatients(0);
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
</script>
</body>
</html>
