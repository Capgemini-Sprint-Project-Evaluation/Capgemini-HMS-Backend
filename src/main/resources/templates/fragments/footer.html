<!-- templates/fragments/footer.html -->
<footer th:fragment="footer" class="mt-auto px-8 py-4 text-xs text-outline border-t border-outline-variant/20 flex justify-between items-center">
    <span>Capgemini HMS &copy; 2026 — Clinical Precision</span>
    <span id="footer-user"></span>
    <script>
        (function() {
            const u = JSON.parse(localStorage.getItem('hms_user') || '{}');
            const el = document.getElementById('footer-user');
            if (el && u.email) el.textContent = 'Logged in as ' + u.email;
        })();
    </script>
</footer>
