sonar.projectKey=hms-project
sonar.projectName=HMS System
sonar.projectVersion=1.0

# Define Multi-Module Source and Test locations
sonar.sources=hms-backend/src/main/java,hms-frontend/src/main/java
sonar.tests=hms-backend/src/test/java,hms-frontend/src/test/java

# Define Binary outputs and encoding
sonar.java.binaries=hms-backend/target/classes,hms-frontend/target/classes
sonar.sourceEncoding=UTF-8

# Integrate with JaCoCo Coverage Reports
sonar.coverage.jacoco.xmlReportPaths=hms-backend/target/site/jacoco/jacoco.xml,hms-frontend/target/site/jacoco/jacoco.xml

# Exclude non-business logic classes to ensure accurate coverage and quality scoring
sonar.exclusions=**/dto/**,**/config/**,**/exception/**,**/*Application.java
sonar.coverage.exclusions=**/dto/**,**/entity/**,**/controller/**,**/config/**,**/exception/**,**/*Application.java
